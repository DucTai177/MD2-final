<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Manager</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>E-WALLET Dashboard</h1>
        <div>
          <label for="monthSelect">Tháng: </label>
          <input type="month" id="monthSelect" />
        </div>
      </header>
      <main>
        <section>
          <h1>Tổng quan</h1>
          <div>
            <span>Số dư hiện tại: </span>
            <strong id="totalBalance">0 d</strong>
          </div>
          <div>
            <span>Tổng thu: </span> <strong id="totalIncome">0d</strong>
            <span>Tổng chi: </span> <strong id="totalExpense">0d</strong>
          </div>
          <div>
            <span>Ngân sách tổng: </span>
            <strong id="budgetStatusText">Đạt</strong>
          </div>
          <div
            style="width: 100%; background: #fff; height: 10px; margin-top: 5px"
          >
            <div
              id="budgetProgess"
              style="height: 100%; background-color: green; width: 0%"
            ></div>
          </div>
        </section>
        <hr />
        <section>
          <h1>Danh mục và hạn mức</h1>
          <form id="formCategory">
            <input
              type="text"
              id="catName"
              placeholder="Tên danh mục"
              required
            />
            <input
              type="number"
              id="catLimit"
              placeholder="Hạn mức"
              required
              min="0"
            />
            <button type="submit">Thêm danh mục</button>
          </form>
          <div id="categoryList" style="margin-top: 15px"></div>
        </section>
        <hr />
        <section>
          <h1>Thêm giao dịch</h1>
          <form id="formTransaction">
            <label for="transAmount">Số tiền: </label>
            <input type="number" id="transAmount" required min="1" />
            <select name="transType" id="transType">
              <option value="chiTien">Chi tiền</option>
              <option value="thuTien">Thu tiền</option>
            </select>
            <br />
            <label for="transCategory">Danh mục: </label>
            <select name="transCategory" required id="transCategory"></select>
            <br />
            <label for="transDate">Ngày: </label>
            <input type="date" id="transDate" /> <br />
            <label for="transNote">Ghi chú: </label>
            <input type="text" id="transNote" />
            <button type="submit">Lưu giao dịch</button>
          </form>
        </section>
        <section>
          <h1>Lịch sử giao dịch</h1>
          <div id="transactionList"></div>
        </section>
      </main>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
