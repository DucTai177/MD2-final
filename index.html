<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Wallet - Quản lý chi tiêu</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <header class="app-header">
        <h2>Quản Lý Chi Tiêu</h2>
        <div class="month-filter">
          <input type="month" id="month-picker" title="Chọn tháng thống kê" />
        </div>
      </header>

      <div id="alert-container"></div>

      <section class="card dashboard">
        <div class="balance-section">
          <p>Số dư hiện tại</p>
          <h1 id="current-balance" class="text-green">0 đ</h1>
        </div>
        <div class="summary-section">
          <div class="summary-box">
            <p>Thu tháng này</p>
            <h3 id="total-income" class="text-green">0 đ</h3>
          </div>
          <div class="summary-box">
            <p>Chi tháng này</p>
            <h3 id="total-expense" class="text-red">0 đ</h3>
          </div>
        </div>
      </section>

      <div class="grid-layout">
        <section class="card">
          <h3 class="section-title">Giao dịch mới</h3>
          <form id="transaction-form">
            <div class="form-group">
              <input
                type="number"
                id="trans-amount"
                placeholder="Số tiền (+ là thu, - là chi)"
                required
              />
            </div>
            <div class="form-group">
              <select id="trans-category" required>
                <option value="">Chọn danh mục...</option>
                  <option value="">đi chơi</option>
              </select>
            </div>
            <div class="form-group">
              <input
                type="text"
                id="trans-note"
                placeholder="Ghi chú (Tùy chọn)"
              />
            </div>
            <div class="form-group">
              <input type="date" id="trans-date" required />
            </div>
            <button type="submit" class="btn btn-primary">Lưu giao dịch</button>
          </form>
        </section>

        <section class="card">
          <h3 class="section-title">Thêm danh mục</h3>
          <form id="category-form">
            <div class="form-group flex-row">
              <input
                type="text"
                id="cat-name"
                placeholder="Tên danh mục (VD: Ăn uống)"
                required
              />
              <input
                type="number"
                id="cat-limit"
                placeholder="Hạn mức (đ)"
                required
              />
            </div>
            <button type="submit" class="btn btn-secondary">
              Thêm danh mục
            </button>
          </form>
        </section>
      </div>

      <div class="grid-layout">
        <section class="card">
          <h3 class="section-title">Lịch sử (Mới nhất trên cùng)</h3>
          <ul id="transaction-history" class="list-container"></ul>
        </section>

        <section class="card">
          <h3 class="section-title">Trạng thái Ngân sách</h3>
          <div id="category-list" class="list-container"></div>
        </section>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
